specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Sentry
providerId: sentry
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Error Monitoring
description: FOCUS-aligned FinOps for Sentry.
sources:
  - https://sentry.io/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Sentry
serviceCategory: Error Monitoring
billingModel:
  pricingCategory: Subscription + Volume
  billingFrequency: Monthly
  billingCurrency: USD
focusColumns:
  ServiceName: Sentry
  ServiceCategory: Error Monitoring
  ProviderName: Sentry
  PublisherName: Sentry
  BillingCurrency: USD
meters:
  - name: errors
    unit: error
    aggregation: sum
    dimensions:
      - project
      - environment
  - name: spans
    unit: span
    aggregation: sum
  - name: session_replays
    unit: replay
    aggregation: sum
  - name: uptime_monitors
    unit: monitor-month
    aggregation: max
  - name: cron_monitors
    unit: monitor-month
    aggregation: max
  - name: attachments_bytes
    unit: GB-month
    aggregation: max
principles:
  - name: Visibility
    description: Track Sentry consumption monthly via admin/billing exports.
  - name: Allocation
    description: Tag seats/usage to teams or cost centers for chargeback.
  - name: Optimization
    description: Right-size tier and seat count quarterly; reclaim inactive seats.
  - name: Accountability
    description: Set spend alerts and renew at observed active utilization.
