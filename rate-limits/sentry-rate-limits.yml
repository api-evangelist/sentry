specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Sentry
providerId: sentry
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Error Monitoring
description: Sentry SDK ingest is per-DSN; Web API is per-token.
sources:
  - https://sentry.io/pricing/
  - https://docs.sentry.io/api/ratelimits/
headers:
  limit: X-Sentry-Rate-Limit-Limit
  remaining: X-Sentry-Rate-Limit-Remaining
  reset: X-Sentry-Rate-Limit-Reset
responseCodes:
  throttled: 429
limits:
  - name: Web API (read)
    scope: auth_token
    metric: requests_per_second
    limit: 40
    timeFrame: second
  - name: Web API (write)
    scope: auth_token
    metric: requests_per_second
    limit: 40
    timeFrame: second
  - name: Project ingest cap (per DSN)
    scope: project
    metric: events_per_minute
    limit: configurable
    notes: Set spike protection in project settings.
  - name: Account ingest
    scope: account
    metric: events_per_month
    limit: tier-based
